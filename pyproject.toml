[project]
name = "momo"
version = "0.1.0"
description = "Tracking / idle eyes + Ollama + Qwen TTS + Arduino SG90"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "fastapi>=0.115.0",
    "uvicorn[standard]>=0.32.0",
    "httpx>=0.27.0",
    "opencv-python-headless>=4.10.0",
    "numpy>=1.26.0",
    "pydantic>=2.9.0",
    "pydantic-settings>=2.6.0",
    "pyserial>=3.5",
    "soundfile>=0.12.1",
    "ultralytics>=8.3.0",
    "torch>=2.4.0",
    "qwen-tts>=0.1.0",
]

[project.optional-dependencies]
audio = [
    "pygame>=2.6.0",
]

[project.scripts]
momo-server = "src.main:run"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src"]
